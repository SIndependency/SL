<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Green Energy Change</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #eafaf1;
    padding: 20px;
  }
  h1 { color: #27ae60; }
  .slider-box { margin: 20px auto; max-width: 400px; }
  input[type=range] { width: 100%; }
  #sky, #plant { font-size: 60px; margin: 10px; }
  #aqiLabel, #plantLabel { font-size: 22px; font-weight: bold; }
</style>
</head>
<body>

<h1>🌍 Green Energy Change</h1>
<p>Move the sliders. Watch what happens to the sky and the plant.</p>

<div class="slider-box">
  <label>🪨 Coal: <span id="coalVal">40</span>%</label><br>
  <input type="range" id="coalSlider" min="0" max="100" value="40" oninput="update(this)">
</div>

<div class="slider-box">
  <label>☢️ Nuclear: <span id="nuclearVal">20</span>%</label><br>
  <input type="range" id="nuclearSlider" min="0" max="100" value="20" oninput="update(this)">
</div>

<div class="slider-box">
  <label>🌿 Green Energy: <span id="greenVal">40</span>%</label><br>
  <input type="range" id="greenSlider" min="0" max="100" value="40" oninput="update(this)">
</div>

<p id="totalLabel">Total energy mix: 100%</p>

<div class="slider-box">
  <label>🔋 Electric Cars Percentage: <span id="evVal">50</span>%</label><br>
  <input type="range" id="evSlider" min="0" max="100" value="50" oninput="update()">
</div>

<div id="sky">🌤️</div>
<div id="aqiLabel"></div>
<div id="co2Label"></div>
<div id="savingLabel"></div>

<div id="plant">🌱</div>
<div id="plantLabel"></div>
<div id="growthLabel"></div>

<script>
// This is the whole "brain" of the simulator. One function, top to bottom.
// "changedSlider" tells us which slider the student just moved (or nothing,
// if this is the very first run when the page loads).
function update(changedSlider) {

  // 1. Read the four sliders
  var coal = Number(document.getElementById("coalSlider").value);
  var nuclear = Number(document.getElementById("nuclearSlider").value);
  var green = Number(document.getElementById("greenSlider").value);
  var ev = Number(document.getElementById("evSlider").value);

  // 1b. The three energy sliders can't add up to more than 100%.
  //     If they do, push the slider the student just moved back down.
  var energyTotal = coal + nuclear + green;
  if (energyTotal > 100 && changedSlider) {
    var overflow = energyTotal - 100;
    changedSlider.value = Number(changedSlider.value) - overflow;

    // Re-read all three, since we just changed one of them
    coal = Number(document.getElementById("coalSlider").value);
    nuclear = Number(document.getElementById("nuclearSlider").value);
    green = Number(document.getElementById("greenSlider").value);
    energyTotal = coal + nuclear + green;
  }
  document.getElementById("totalLabel").textContent = "Total energy mix: " + energyTotal + "%";

  // 2. Show the numbers next to the sliders
  document.getElementById("coalVal").textContent = coal;
  document.getElementById("nuclearVal").textContent = nuclear;
  document.getElementById("greenVal").textContent = green;
  document.getElementById("evVal").textContent = ev;

  // 3. Each power source makes a different amount of CO2 per unit of power.
  //    Coal is dirty (820), green energy is clean (30), nuclear is very clean (12).
  var gridDirtiness = (coal * 820 + green * 30 + nuclear * 12) / 100;

  // 3b. Cars that aren't electric burn petrol directly (fully dirty).
  //     Electric cars are only as clean as the power grid that charges them.
  var petrol = 100 - ev;
  var pollution = Math.round(petrol + (ev * gridDirtiness) / 820);

  // 4. Pick a sky picture and a word for the air
  var sky = "☀️";
  var aqiWord = "Good";
  if (pollution > 60) {
    sky = "🌫️";
    aqiWord = "Bad";
  } else if (pollution > 30) {
    sky = "🌤️";
    aqiWord = "Okay";
  }
  document.getElementById("sky").textContent = sky;
  document.getElementById("aqiLabel").textContent = "Air Quality: " + aqiWord;

  // 4b. Turn pollution into a CO2 number (ppm = parts per million)
  var co2 = Math.round(415 + pollution * 0.5);
  document.getElementById("co2Label").textContent = "CO₂: " + co2 + " ppm";

  // 4c. Emissions saving = the opposite of pollution
  var saving = Math.round(100 - pollution);
  document.getElementById("savingLabel").textContent = "Your Emissions Saving: " + saving + "%";

  // 5. Pick a plant picture and a word for how it feels
  var plant = "🌳";
  var plantWord = "Thriving!";
  if (pollution > 60) {
    plant = "🥀";
    plantWord = "Struggling.";
  } else if (pollution > 30) {
    plant = "🌱";
    plantWord = "A bit stressed.";
  }
  document.getElementById("plant").textContent = plant;
  document.getElementById("plantLabel").textContent = "Plant: " + plantWord;

  // 6. Growth rate: more pollution = slower growth, never below 10%
  var growth = Math.round(100 - pollution * 0.8);
  if (growth < 10) { growth = 10; }
  document.getElementById("growthLabel").textContent = "Plant Growth Rate: " + growth + "%";
}

// Run it once when the page loads
update();
</script>

</body>
</html>
